<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>FPT University - Students</title>
    <style>
        body {
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #e8d4a0;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo img {
            height: 40px;
        }
        .header-logo span {
            font-size: 14px;
            color: #333;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        .search-box input {
            padding: 8px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }
        .search-box button {
            padding: 8px 15px;
            background-color: #f39c12;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .banner {
            background-color: #f39c12;
            padding: 30px;
            text-align: center;
        }
        .banner img {
            max-width: 100%;
            height: auto;
            max-height: 300px;
        }
        .breadcrumb-section {
            background-color: white;
            padding: 15px 30px;
            font-size: 14px;
            color: #999;
        }
        .breadcrumb-section a {
            color: #f39c12;
            text-decoration: none;
        }
        .content {
            padding: 40px 30px;
            background-color: white;
            margin: 20px;
            border-radius: 4px;
        }
        .content h2 {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #333;
        }
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        .student-card {
            text-align: center;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 4px;
        }
        .student-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        .student-id {
            font-size: 14px;
            color: #999;
            margin-bottom: 10px;
        }
        .student-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .student-status {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .student-status label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 5px 0;
        }
        .student-status input {
            margin: 0;
        }
        .submit-btn {
            background-color: #f39c12;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        .submit-btn:hover {
            background-color: #e67e22;
        }
        .footer {
            background-color: #f39c12;
            color: white;
            padding: 30px;
            margin-top: 40px;
        }
        .footer-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 20px;
        }
        .footer-section h4 {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .footer-section p {
            font-size: 14px;
            margin: 5px 0;
        }
        .footer-section a {
            color: white;
            text-decoration: none;
        }
        .social-icons {
            display: flex;
            gap: 15px;
            font-size: 18px;
        }
        .social-icons a {
            color: white;
            text-decoration: none;
        }
        .footer-bottom {
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-logo">
            <img src="" alt="FPT Logo">
            <span>FPT UNIVERSITY</span>
        </div>
        <div class="search-box">
            <input type="text" placeholder="Search">
            <button>Search</button>
        </div>
    </div>

    <!-- Banner -->
    <div class="banner">
        <img src="" alt="Team Banner">
    </div>

    <!-- Breadcrumb -->
    <div class="breadcrumb-section">
        <a href="#home">Home</a> / <span>Students</span>
    </div>

    <!-- Content -->
    <div class="content">
        <h2>Students Detail</h2>
        
        <div class="students-grid">
            <!-- Student 1 -->
            <div class="student-card">
                <img src="" alt="Student 1">
                <div class="student-id">DE160182</div>
                <div class="student-name">Nguyễn Hữu Quốc Khánh</div>
                <div class="student-status">
                    <label>
                        <input type="radio" name="status1"> Absent
                    </label>
                </div>
                <button class="submit-btn">Submit</button>
            </div>

            <!-- Student 2 -->
            <div class="student-card">
                <img src="" alt="Student 2">
                <div class="student-id">DE160377</div>
                <div class="student-name">Dương Chey Vĩnh Thiên</div>
                <div class="student-status">
                    <label>
                        <input type="radio" name="status2"> Present
                    </label>
                </div>
                <button class="submit-btn">Submit</button>
            </div>

            <!-- Student 3 -->
            <div class="student-card">
                <img src="" alt="Student 3">
                <div class="student-id">DE160547</div>
                <div class="student-name">Bùi Nguyễn Phúc</div>
                <div class="student-status">
                    <label>
                        <input type="radio" name="status3"> Absent
                    </label>
                </div>
                <button class="submit-btn">Submit</button>
            </div>

            <!-- Student 4 -->
            <div class="student-card">
                <img src="" alt="Student 4">
                <div class="student-id">DE170548</div>
                <div class="student-name">Lê Hoàng Minh</div>
                <div class="student-status">
                    <label>
                        <input type="radio" name="status4"> Present
                    </label>
                </div>
                <button class="submit-btn">Submit</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>Our Address</h4>
                <p>📍 Lot 6, Saigon Hi-Tech Park</p>
                <p>☎️ +84 28 7300 1111</p>
                <p>📧 info@fpt.edu.vn</p>
            </div>
            <div class="footer-section">
                <div class="social-icons">
                    <a href="#">G+</a>
                    <a href="#">f</a>
                    <a href="#">in</a>
                    <a href="#">y</a>
                    <a href="#">📷</a>
                    <a href="#">✉️</a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            © Copyright 2023
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
