<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>Bootstrap 5 Grid Test</title>
    <style>
        body {
            background-color: #2d2d2d;
            color: #333;
            padding: 20px;
        }
        .header {
            background-color: #e8e8e8;
            padding: 30px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 600;
        }
        .grid-container {
            background-color: #e8e8e8;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .col-box {
            background-color: #d0d0d0;
            border: 1px solid #999;
            padding: 15px;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer {
            background-color: #d4c5b9;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Let's test the grid!</h1>
    </div>

    <div class="grid-container">
        <div class="container-fluid">
            <!-- First row: 2 columns -->
            <div class="row mb-3">
                <div class="col-6">
                    <div class="col-box">First col</div>
                </div>
                <div class="col-6">
                    <div class="col-box">Second col</div>
                </div>
            </div>

            <!-- Second row: 3 columns -->
            <div class="row mb-3">
                <div class="col-4">
                    <div class="col-box">col</div>
                </div>
                <div class="col-4">
                    <div class="col-box">col</div>
                </div>
                <div class="col-4">
                    <div class="col-box">col</div>
                </div>
            </div>

            <!-- Third row: 4 columns -->
            <div class="row">
                <div class="col-3">
                    <div class="col-box">col</div>
                </div>
                <div class="col-3">
                    <div class="col-box">col</div>
                </div>
                <div class="col-3">
                    <div class="col-box">col</div>
                </div>
                <div class="col-3">
                    <div class="col-box">col</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        Created by ABC!
    </div>

    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
