<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>FPT University</title>
    <style>
        body {
            background-color: #2d2d2d;
            margin: 0;
            padding: 20px;
        }
        .header {
            background-color: #f39c12;
            padding: 30px;
            text-align: center;
            margin-bottom: 0;
        }
        .header-content {
            background-color: white;
            padding: 20px;
            margin: 0 auto;
            max-width: 600px;
        }
        .header-content img {
            max-width: 100%;
            height: auto;
            margin-bottom: 15px;
        }
        .header-content h1 {
            color: #f39c12;
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }
        .nav-bar {
            background-color: #f39c12;
            padding: 15px 30px;
            text-align: center;
        }
        .nav-bar a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
        }
        .nav-bar a:hover {
            text-decoration: underline;
        }
        .content {
            background-color: white;
            padding: 40px;
            text-align: center;
        }
        .content h2 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .content p {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }
        .footer {
            background-color: #e8d4a0;
            padding: 20px;
            text-align: center;
            color: white;
            font-weight: 500;
        }
        .container-wrapper {
            background-color: white;
            margin: 0 auto;
            max-width: 900px;
        }
    </style>
</head>
<body>
    <div class="container-wrapper">
        <!-- Header with Logo -->
        <div class="header">
            <div class="header-content">
                <img src="logofpt.png" alt="FPT Education Logo">
                <h1>FPT UNIVERSITY</h1>
            </div>
        </div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>

        <!-- Content Section -->
        <div class="content">
            <h2>About</h2>
            <p>This is the about section of the website.</p>

            <h2>Contact</h2>
            <p>For any inquiries, please contact us at example@example.com.</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            © 2023 Website. All rights reserved.
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
</body>
</html>
